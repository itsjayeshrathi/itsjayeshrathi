name: Update Monkeytype Stats

on:
  schedule:
    - cron: 0 0 1 * *
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch Monkeytype Stats
        run: |
          curl -H "Authorization: ApeKey ${{ secrets.MONKEYTYPE_API_KEY }}" \
          https://api.monkeytype.com/users/personalBests?mode=time > stats.json

      - name: Debug API response
        run: cat stats.json

      - name: Parse stats
        run: |
          WPM=$(jq '.data."60"[0].wpm // "null"' stats.json | tr -d '"')
          ACC=$(jq '.data."60"[0].acc // "null"' stats.json | tr -d '"')

          echo "WPM=$WPM" >> $GITHUB_ENV
          echo "ACC=$ACC" >> $GITHUB_ENV

      - name: Debug parsed values
        run: |
          echo "WPM is: $WPM"
          echo "ACC is: $ACC"

      - name: Update README
        run: |
          sed -i "s/wpm: .*/wpm: ${WPM}/" README.md
          sed -i "s/accuracy: .*/accuracy: ${ACC}%/" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Updated Monkeytype stats [skip ci]" || exit 0
          git push
