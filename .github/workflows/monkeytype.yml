name: Update Monkeytype Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch stats
        run: |
          curl -H "Authorization: Bearer ${{ secrets.MONKEYTYPE_API_KEY }}" \
          https://api.monkeytype.com/users/stats > stats.json

      - name: Parse stats
        run: |
          WPM=$(jq '.data.personalBests.time["60"][0].wpm' stats.json)
          ACC=$(jq '.data.personalBests.time["60"][0].acc' stats.json)

          echo "WPM=$WPM" >> $GITHUB_ENV
          echo "ACC=$ACC" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "s/<WPM>/$WPM/g" README.md
          sed -i "s/<ACC>/$ACC/g" README.md

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update Monkeytype stats" || exit 0
          git push
